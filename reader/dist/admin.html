<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>作品管理</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#14110d;--surface:#1e1a15;--surface2:#282319;--border:#3a3328;
  --text:#d8ceb8;--text2:#9a8e7a;--accent:#c9a06c;--accent2:#ddb87e;
  --danger:#c95050;--danger2:#e06060;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',-apple-system,sans-serif;font-size:.9rem;line-height:1.6;min-height:100vh;}
a{color:var(--accent);text-decoration:none;}
a:hover{color:var(--accent2);}

.header{position:sticky;top:0;z-index:100;background:rgba(20,17,13,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;}
.header h1{font-size:1.1rem;font-weight:500;color:var(--text);flex:1;}
.header .back{font-size:.85rem;color:var(--text2);}
.header .back:hover{color:var(--accent);}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:.8rem;font-family:inherit;cursor:pointer;transition:all .15s ease;}
.btn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);color:#14110d;border-color:var(--accent);font-weight:500;}
.btn.primary:hover{background:var(--accent2);border-color:var(--accent2);}
.btn.danger{color:var(--danger);border-color:var(--danger);}
.btn.danger:hover{background:var(--danger);color:#fff;}
.btn.sm{padding:.3rem .6rem;font-size:.75rem;}

.toolbar{display:flex;gap:.5rem;flex-wrap:wrap;padding:1rem 2rem;border-bottom:1px solid var(--border);}
.toolbar .spacer{flex:1;}

.main{max-width:1000px;margin:0 auto;padding:2rem;}

.stats{display:flex;gap:2rem;margin-bottom:2rem;padding:1rem 1.25rem;background:var(--surface);border-radius:8px;border:1px solid var(--border);}
.stats .stat{display:flex;flex-direction:column;gap:.15rem;}
.stats .stat .label{font-size:.75rem;color:var(--text2);}
.stats .stat .value{font-size:1.1rem;font-weight:500;color:var(--accent);}

.work-list{display:flex;flex-direction:column;gap:.5rem;}
.work-row{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;transition:border-color .15s ease;}
.work-row:hover{border-color:var(--accent);}
.work-row .info{flex:1;min-width:0;}
.work-row .title{font-size:.95rem;font-weight:500;margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.work-row .meta{font-size:.75rem;color:var(--text2);display:flex;gap:.75rem;flex-wrap:wrap;}
.work-row .actions{display:flex;gap:.35rem;flex-shrink:0;}

.empty{text-align:center;padding:4rem 1rem;color:var(--text2);}
.empty p{margin-top:.5rem;font-size:.85rem;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:flex-start;justify-content:center;padding:3rem 1rem;overflow-y:auto;}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:720px;padding:2rem;animation:slideUp .2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.modal h2{font-size:1.1rem;font-weight:500;margin-bottom:1.5rem;color:var(--text);}
.form-group{margin-bottom:1.25rem;}
.form-group label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:.35rem;}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:.55rem .75rem;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:.85rem;font-family:inherit;
  transition:border-color .15s ease;outline:none;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:200px;line-height:1.8;}
.form-group select{cursor:pointer;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-actions{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);}
.char-count{font-size:.7rem;color:var(--text2);margin-top:.25rem;}

/* Preview */
.preview-modal .modal{max-width:800px;}
.preview-content{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:2rem;max-height:60vh;overflow-y:auto;line-height:2.1;font-size:1rem;}
.preview-content p{margin-bottom:1.5em;text-indent:2em;}
.preview-content p:last-child{margin-bottom:0;}

@media (max-width:640px){
  .header,.toolbar{padding:.75rem 1rem;}
  .main{padding:1rem;}
  .form-row{grid-template-columns:1fr;}
  .work-row{flex-wrap:wrap;}
  .work-row .actions{width:100%;justify-content:flex-end;}
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back">← 返回书架</a>
  <h1>作品管理</h1>
  <label class="btn sm" id="import-label">
    导入 JSON
    <input type="file" accept=".json" id="import-input" style="display:none;">
  </label>
  <button class="btn primary sm" id="export-btn">导出 JSON</button>
</div>

<div class="toolbar">
  <button class="btn primary" id="add-btn">+ 新建作品</button>
  <div class="spacer"></div>
  <button class="btn sm" id="sort-date-btn">按日期排序</button>
  <button class="btn sm" id="sort-order-btn">按序号排序</button>
</div>

<div class="main">
  <div class="stats" id="stats"></div>
  <div class="work-list" id="work-list"></div>
  <div class="empty" id="empty-state" style="display:none;">
    <p>还没有作品</p>
    <p>点击「导入 JSON」导入已有作品，或「新建作品」开始创作</p>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2 id="modal-title">新建作品</h2>
    <input type="hidden" id="edit-id">
    <div class="form-row">
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="edit-title" placeholder="《作品名》">
      </div>
      <div class="form-group">
        <label>类型</label>
        <select id="edit-type">
          <option value="散文">散文</option>
          <option value="随笔">随笔</option>
          <option value="诗歌">诗歌</option>
          <option value="古诗">古诗</option>
          <option value="书信">书信</option>
          <option value="杂文">杂文</option>
          <option value="小说">小说</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>分类</label>
        <input type="text" id="edit-category" placeholder="生活随笔">
      </div>
      <div class="form-group">
        <label>写作日期</label>
        <input type="text" id="edit-writing-date" placeholder="2026 年 2 月 2 日">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>排序（数字越小越靠前）</label>
        <input type="number" id="edit-order" value="0">
      </div>
      <div class="form-group">
        <label>归档</label>
        <select id="edit-archived">
          <option value="false">否</option>
          <option value="true">是（不显示）</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>正文内容</label>
      <textarea id="edit-content" placeholder="段落之间用空行分隔..." rows="12"></textarea>
      <div class="char-count" id="edit-char-count">0 字</div>
    </div>
    <div class="form-actions">
      <button class="btn" id="cancel-btn">取消</button>
      <button class="btn primary" id="save-btn">保存</button>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div class="modal-overlay preview-modal" id="preview-modal">
  <div class="modal">
    <h2 id="preview-title">预览</h2>
    <div class="preview-content" id="preview-content"></div>
    <div class="form-actions">
      <button class="btn" onclick="document.getElementById('preview-modal').classList.remove('active')">关闭</button>
    </div>
  </div>
</div>

<script>
(function(){
  var works=[];
  var sortField='date';

  // ─── UUID ───
  function uuid(){
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
      var r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);
    });
  }

  // ─── Init ───
  function init(){
    try{works=JSON.parse(localStorage.getItem('admin_works')||'[]');}catch(e){works=[];}
    render();
    bindEvents();
  }

  function save(){localStorage.setItem('admin_works',JSON.stringify(works));}

  // ─── Render ───
  function render(){
    var sorted=works.slice().sort(function(a,b){
      if(sortField==='date')return (b.added_date||'').localeCompare(a.added_date||'');
      return (a.order||0)-(b.order||0);
    });
    var list=document.getElementById('work-list');
    var empty=document.getElementById('empty-state');
    if(sorted.length===0){list.innerHTML='';empty.style.display='block';}
    else{
      empty.style.display='none';
      list.innerHTML=sorted.map(function(w){
        return '<div class="work-row" data-id="'+w.id+'">'+
          '<div class="info">'+
            '<div class="title">'+esc(w.title||'无标题')+'</div>'+
            '<div class="meta">'+
              '<span>'+esc(w.type||'')+'</span>'+
              '<span>'+(w.char_count||0)+' 字</span>'+
              '<span>'+esc(w.writing_date||'')+'</span>'+
              (w.is_archived?'<span style="color:var(--danger)">已归档</span>':'')+
            '</div>'+
          '</div>'+
          '<div class="actions">'+
            '<button class="btn sm" onclick="APP.preview(\''+w.id+'\')">预览</button>'+
            '<button class="btn sm" onclick="APP.edit(\''+w.id+'\')">编辑</button>'+
            '<button class="btn sm danger" onclick="APP.del(\''+w.id+'\')">删除</button>'+
          '</div>'+
        '</div>';
      }).join('');
    }
    updateStats();
  }

  function updateStats(){
    var total=works.length;
    var chars=works.reduce(function(s,w){return s+(w.char_count||0);},0);
    var archived=works.filter(function(w){return w.is_archived;}).length;
    document.getElementById('stats').innerHTML=
      '<div class="stat"><span class="label">作品总数</span><span class="value">'+total+'</span></div>'+
      '<div class="stat"><span class="label">总字数</span><span class="value">'+chars+'</span></div>'+
      '<div class="stat"><span class="label">已归档</span><span class="value">'+archived+'</span></div>'+
      '<div class="stat"><span class="label">当前排序</span><span class="value">'+(sortField==='date'?'按日期':'按序号')+'</span></div>';
  }

  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  // ─── Events ───
  function bindEvents(){
    document.getElementById('add-btn').addEventListener('click',function(){openModal();});
    document.getElementById('cancel-btn').addEventListener('click',function(){closeModal();});
    document.getElementById('save-btn').addEventListener('click',function(){saveWork();});
    document.getElementById('export-btn').addEventListener('click',function(){exportJSON();});
    document.getElementById('import-input').addEventListener('change',function(e){importJSON(e);});
    document.getElementById('sort-date-btn').addEventListener('click',function(){sortField='date';render();});
    document.getElementById('sort-order-btn').addEventListener('click',function(){sortField='order';render();});

    document.getElementById('edit-content').addEventListener('input',function(){
      document.getElementById('edit-char-count').textContent=this.value.replace(/\s/g,'').length+' 字';
    });

    // Close modals on overlay click
    document.getElementById('edit-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
    document.getElementById('preview-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('active');});

    // Keyboard
    document.addEventListener('keydown',function(e){
      if(e.key==='Escape'){closeModal();document.getElementById('preview-modal').classList.remove('active');}
    });
  }

  // ─── Modal ───
  function openModal(work){
    document.getElementById('modal-title').textContent=work?'编辑作品':'新建作品';
    document.getElementById('edit-id').value=work?work.id:'';
    document.getElementById('edit-title').value=work?work.title:'';
    document.getElementById('edit-type').value=work?work.type:'散文';
    document.getElementById('edit-category').value=work?(work.category||''):'';
    document.getElementById('edit-writing-date').value=work?(work.writing_date||''):'';
    document.getElementById('edit-order').value=work?(work.order||0):0;
    document.getElementById('edit-archived').value=work?(work.is_archived?'true':'false'):'false';
    document.getElementById('edit-content').value=work?work.content:'';
    document.getElementById('edit-char-count').textContent=(work?work.content.replace(/\s/g,'').length:0)+' 字';
    document.getElementById('edit-modal').classList.add('active');
    document.getElementById('edit-title').focus();
  }

  function closeModal(){document.getElementById('edit-modal').classList.remove('active');}

  function saveWork(){
    var id=document.getElementById('edit-id').value;
    var title=document.getElementById('edit-title').value.trim();
    var content=document.getElementById('edit-content').value;
    if(!title){alert('请输入标题');return;}
    if(!content.trim()){alert('请输入正文内容');return;}

    var now=new Date();
    var dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    var charCount=content.replace(/\s/g,'').length;

    if(id){
      // Edit existing
      for(var i=0;i<works.length;i++){
        if(works[i].id===id){
          works[i].title=title;
          works[i].content=content;
          works[i].type=document.getElementById('edit-type').value;
          works[i].category=document.getElementById('edit-category').value;
          works[i].writing_date=document.getElementById('edit-writing-date').value;
          works[i].order=parseInt(document.getElementById('edit-order').value)||0;
          works[i].is_archived=document.getElementById('edit-archived').value==='true';
          works[i].char_count=charCount;
          works[i].modified_date=dateStr;
          break;
        }
      }
    }else{
      // Add new
      works.push({
        id:uuid(),
        title:title,
        content:content,
        type:document.getElementById('edit-type').value,
        category:document.getElementById('edit-category').value,
        writing_date:document.getElementById('edit-writing-date').value,
        order:parseInt(document.getElementById('edit-order').value)||0,
        is_archived:document.getElementById('edit-archived').value==='true',
        char_count:charCount,
        added_date:dateStr,
        modified_date:dateStr,
        tags:[],
        excerpt:content.split(/\r?\n\r?\n/)[0].substring(0,120)+'…'
      });
    }
    save();
    render();
    closeModal();
  }

  // ─── Edit / Delete / Preview ───
  window.APP={
    edit:function(id){
      for(var i=0;i<works.length;i++){if(works[i].id===id){openModal(works[i]);return;}}
    },
    del:function(id){
      if(!confirm('确定删除这篇作品？'))return;
      works=works.filter(function(w){return w.id!==id;});
      save();render();
    },
    preview:function(id){
      for(var i=0;i<works.length;i++){
        if(works[i].id===id){
          var w=works[i];
          document.getElementById('preview-title').textContent=w.title;
          var paras=w.content.split(/\r?\n\r?\n/).filter(function(p){return p.trim();});
          document.getElementById('preview-content').innerHTML=paras.map(function(p){
            return '<p>'+esc(p.trim())+'</p>';
          }).join('');
          document.getElementById('preview-modal').classList.add('active');
          return;
        }
      }
    }
  };

  // ─── Import / Export ───
  function importJSON(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        var arr=data.works||data;
        if(!Array.isArray(arr)){alert('JSON 格式不正确：需要 works 数组');return;}
        // Merge or replace
        if(works.length>0){
          if(!confirm('当前已有 '+works.length+' 篇作品。\n\n确定 = 合并（跳过重复 ID）\n取消 = 替换全部'))return;
          var existingIds={};
          works.forEach(function(w){existingIds[w.id]=true;});
          var added=0;
          arr.forEach(function(w){if(!existingIds[w.id]){works.push(w);added++;}});
          alert('合并完成，新增 '+added+' 篇');
        }else{
          works=arr;
          alert('导入 '+works.length+' 篇作品');
        }
        save();render();
      }catch(err){alert('JSON 解析失败：'+err.message);}
    };
    reader.readAsText(file);
    e.target.value='';
  }

  function exportJSON(){
    var output=JSON.stringify({works:works},null,2);
    var blob=new Blob([output],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='works.json';
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  init();
})();
</script>
</body>
</html>
